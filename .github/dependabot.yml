updates:
- directory: /
  groups:
    actions:
      patterns:
      - "*"
  ignore:
  - dependency-name: "github/gh-aw-actions/**"
  - dependency-name: "github/gh-aw/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  package-ecosystem: github-actions
  schedule:
    interval: weekly
- directory: /java
  groups:
    maven-deps:
      patterns:
      - "*"
  package-ecosystem: maven
  schedule:
    interval: weekly
- directory: /python
  groups:
    pip-deps:
      patterns:
      - "*"
  package-ecosystem: pip
  schedule:
    interval: weekly
- directory: /typescript
  groups:
    npm-deps:
      patterns:
      - "*"
  package-ecosystem: npm
  schedule:
    interval: weekly
- directory: /golang
  groups:
    go-deps:
      patterns:
      - "*"
  package-ecosystem: gomod
  schedule:
    interval: weekly
- directory: /csharp
  groups:
    nuget-deps:
      patterns:
      - "*"
  package-ecosystem: nuget
  schedule:
    interval: weekly
- directory: /rust
  groups:
    cargo-deps:
      patterns:
      - "*"
  package-ecosystem: cargo
  schedule:
    interval: weekly
- directory: /swift
  groups:
    swift-deps:
      patterns:
      - "*"
  package-ecosystem: swift
  schedule:
    interval: weekly
- directory: /kotlin
  groups:
    gradle-deps:
      patterns:
      - "*"
  package-ecosystem: gradle
  schedule:
    interval: weekly
- directory: /php
  groups:
    composer-deps:
      patterns:
      - "*"
  package-ecosystem: composer
  schedule:
    interval: weekly
- directory: /ruby
  groups:
    bundler-deps:
      patterns:
      - "*"
  package-ecosystem: bundler
  schedule:
    interval: weekly
- directory: /elixir
  groups:
    mix-deps:
      patterns:
      - "*"
  package-ecosystem: mix
  schedule:
    interval: weekly
- directory: /dart
  groups:
    pub-deps:
      patterns:
      - "*"
  package-ecosystem: pub
  schedule:
    interval: weekly
version: 2
