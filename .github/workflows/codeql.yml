# Advanced CodeQL workflow replacing the default setup.
#
# IMPORTANT: Disable the default setup in
# Settings → Code security → Code scanning before merging.
#
# C# and C/C++ use manual build mode because autobuild cannot
# auto-detect the build system when sources live in subdirectories.
# Other compiled languages use autobuild for best results.
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '21 14 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: 'actions'
          build-mode: 'none'
        - language: 'c-cpp'
          build-mode: 'manual'
        - language: 'csharp'
          build-mode: 'manual'
        - language: 'go'
          build-mode: 'autobuild'
        - language: 'java-kotlin'
          build-mode: 'autobuild'
        - language: 'javascript-typescript'
          build-mode: 'none'
        - language: 'python'
          build-mode: 'none'
        - language: 'ruby'
          build-mode: 'none'
        - language: 'rust'
          build-mode: 'none'
        - language: 'swift'
          build-mode: 'autobuild'

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Initialize CodeQL
      uses: github/codeql-action/init@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Build C and C++ code
      if: matrix.language == 'c-cpp'
      shell: bash
      run: |
        # Build C project
        cmake -S c -B c/build
        cmake --build c/build
        # Build C++ project
        sudo apt-get update && sudo apt-get install -y libgtest-dev
        cmake -S cpp -B cpp/build
        cmake --build cpp/build

    - name: Build C# code
      if: matrix.language == 'csharp'
      shell: bash
      run: |
        dotnet restore csharp/CornTest.sln
        dotnet build csharp/CornTest/CornTest.csproj --no-restore

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
      with:
        category: "/language:${{matrix.language}}"
