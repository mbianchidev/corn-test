# Advanced CodeQL workflow replacing the default setup.
#
# IMPORTANT: Disable the default setup in
# Settings → Code security → Code scanning before merging.
#
# C#, C/C++, and Java/Kotlin use manual build mode because autobuild
# cannot auto-detect every build system when sources live in subdirectories.
# Other compiled languages use autobuild for best results.
#
name: "CodeQL Advanced"

on:
  schedule:
    - cron: '21 14 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: 'actions'
          build-mode: 'none'
        - language: 'c-cpp'
          build-mode: 'manual'
        - language: 'csharp'
          build-mode: 'manual'
        - language: 'go'
          build-mode: 'autobuild'
        - language: 'java-kotlin'
          build-mode: 'manual'
        - language: 'javascript-typescript'
          build-mode: 'none'
        - language: 'python'
          build-mode: 'none'
        - language: 'ruby'
          build-mode: 'none'
        - language: 'rust'
          build-mode: 'none'
        - language: 'swift'
          build-mode: 'autobuild'

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Set up JDK 17
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Java and Kotlin code
      if: matrix.language == 'java-kotlin'
      shell: bash
      run: |
        mvn -f java/pom.xml -DskipTests compile
        (cd kotlin && ./gradlew --no-daemon assemble)

    - name: Build C and C++ code
      if: matrix.language == 'c-cpp'
      shell: bash
      run: |
        # Build C project
        cmake -S c -B c/build
        cmake --build c/build
        # Build C++ project
        sudo apt-get update && sudo apt-get install -y libgtest-dev
        cmake -S cpp -B cpp/build
        cmake --build cpp/build

    - name: Build C# code
      if: matrix.language == 'csharp'
      shell: bash
      run: |
        dotnet restore csharp/CornTest.sln
        dotnet build csharp/CornTest/CornTest.csproj --no-restore

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        category: "/language:${{matrix.language}}"
