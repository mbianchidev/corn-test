# Advanced CodeQL workflow replacing the default setup.
#
# IMPORTANT: Disable the default setup in
# Settings → Code security → Code scanning before merging.
#
# C# uses autobuild to fix low analysis quality (65% call target
# resolution vs 85% threshold) caused by build-mode: none.
# Other compiled languages also use autobuild for best results.
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '18 7 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: 'c-cpp'
          build-mode: 'autobuild'
        - language: 'csharp'
          build-mode: 'autobuild'
        - language: 'go'
          build-mode: 'autobuild'
        - language: 'java-kotlin'
          build-mode: 'autobuild'
        - language: 'javascript-typescript'
          build-mode: 'none'
        - language: 'python'
          build-mode: 'none'
        - language: 'ruby'
          build-mode: 'none'
        - language: 'swift'
          build-mode: 'autobuild'

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Initialize CodeQL
      uses: github/codeql-action/init@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
      with:
        category: "/language:${{matrix.language}}"
