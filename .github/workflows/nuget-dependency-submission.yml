# Submits NuGet transitive dependencies to the GitHub Dependency Graph.
#
# This replaces the built-in "Automatic dependency submission" setting
# which fails on Dependabot PRs because the GITHUB_TOKEN is read-only.
# After merging, disable the setting in:
#   Settings → Code security → Advanced Security → Dependency graph →
#   Automatic dependency submission → Disabled
#
name: NuGet Dependency Submission

on:
  push:
    branches:
      - main
    paths:
      - 'csharp/**/*.csproj'
      - 'csharp/**/*.sln'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit-nuget:
    name: Submit NuGet Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '8.0'

      - name: Restore NuGet packages
        run: dotnet restore
        working-directory: csharp

      - name: Submit dependencies
        uses: actions/component-detection-dependency-submission-action@98beaea5a1227f3db476e4c9ca959a0cacd7ac4f # main 2026-05-08
        with:
          detectorsCategories: NuGet
