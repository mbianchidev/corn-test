name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6,12 * * *"

jobs:
  test-java:
    name: Java (JUnit 5)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: java
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven'
        cache-dependency-path: java/pom.xml

    - name: Build with Maven
      run: mvn clean compile

    - name: Run tests
      id: run_tests
      run: mvn test
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-java
        path: |
          java/target/surefire-reports/**/*
          java/target/*.log
        retention-days: 30

  test-python:
    name: Python (pytest + unittest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run pytest
      run: python -m pytest --junitxml=reports/pytest-results.xml -v
      continue-on-error: true

    - name: Run unittest
      run: python -m pytest tests/test_*_pyunit.py --junitxml=reports/pyunit-results.xml -v
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-python
        path: python/reports/*.xml
        retention-days: 30

  test-typescript:
    name: TypeScript (Jest + Playwright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: typescript
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: typescript/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run Jest tests
      run: npx jest --ci --reporters=default --reporters=jest-junit
      continue-on-error: true
      env:
        JEST_JUNIT_OUTPUT_DIR: reports

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npx playwright test --reporter=junit
      continue-on-error: true
      env:
        PLAYWRIGHT_JUNIT_OUTPUT_NAME: reports/playwright-results.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-typescript
        path: typescript/reports/*.xml
        retention-days: 30

  test-golang:
    name: Go (testing)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: golang
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: golang/go.sum

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Run tests
      run: gotestsum --junitfile reports/go-test-results.xml -- -v ./...
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-golang
        path: golang/reports/*.xml
        retention-days: 30

  test-csharp:
    name: C# (xUnit.net)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: csharp
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Restore dependencies
      run: dotnet restore

    - name: Run tests
      run: dotnet test --logger "junit;LogFilePath=reports/xunit-results.xml" --no-restore
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-csharp
        path: csharp/**/reports/*.xml
        retention-days: 30

  test-rust:
    name: Rust (cargo test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rust
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo2junit
      run: cargo install cargo2junit

    - name: Run tests
      run: cargo test -- -Z unstable-options --format json 2>&1 | cargo2junit > reports/rust-test-results.xml
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-rust
        path: rust/reports/*.xml
        retention-days: 30

  test-cpp:
    name: C++ (Google Test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cpp
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libgtest-dev

    - name: Build
      run: |
        mkdir -p build && cd build
        cmake ..
        make

    - name: Run tests
      run: |
        mkdir -p reports
        cd build && ctest --output-junit ../reports/gtest-results.xml --output-on-failure
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-cpp
        path: cpp/reports/*.xml
        retention-days: 30

  test-c:
    name: C (Unity)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: c
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake ruby

    - name: Build
      run: |
        mkdir -p build && cd build
        cmake ..
        make

    - name: Run tests
      run: |
        mkdir -p reports
        cd build && ctest --output-junit ../reports/unity-results.xml --output-on-failure
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-c
        path: c/reports/*.xml
        retention-days: 30

  test-swift:
    name: Swift (Swift Testing)
    runs-on: macos-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: swift
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build
      run: swift build

    - name: Run tests
      run: swift test 2>&1 | tee reports/swift-test-output.txt
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-swift
        path: swift/reports/*
        retention-days: 30

  test-kotlin:
    name: Kotlin (kotlin.test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: kotlin
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Run tests
      run: ./gradlew test
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-kotlin
        path: kotlin/build/test-results/**/*.xml
        retention-days: 30

  test-php:
    name: PHP (PHPUnit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: php
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer

    - name: Install dependencies
      run: composer install --no-interaction

    - name: Run tests
      run: vendor/bin/phpunit --log-junit reports/phpunit-results.xml
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-php
        path: php/reports/*.xml
        retention-days: 30

  test-ruby:
    name: Ruby (RSpec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ruby
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true
        working-directory: ruby

    - name: Run tests
      run: bundle exec rspec --format RspecJunitFormatter --out reports/rspec-results.xml --format documentation
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-ruby
        path: ruby/reports/*.xml
        retention-days: 30

  test-elixir:
    name: Elixir (ExUnit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: elixir
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: '1.16'
        otp-version: '26'

    - name: Install dependencies
      run: mix deps.get

    - name: Run tests
      run: mix test --formatter JUnitFormatter
      continue-on-error: true
      env:
        JUNIT_OUTPUT_DIR: reports

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-elixir
        path: elixir/reports/*.xml
        retention-days: 30

  test-dart:
    name: Dart (dart test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dart
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: '3.3.0'

    - name: Install dependencies
      run: dart pub get

    - name: Run tests
      run: |
        mkdir -p reports
        dart test --reporter json | dart run junitreport:tojunit > reports/dart-test-results.xml
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-dart
        path: dart/reports/*.xml
        retention-days: 30

  collect-results:
    name: Collect All Test Results
    needs:
      - test-java
      - test-python
      - test-typescript
      - test-golang
      - test-csharp
      - test-rust
      - test-cpp
      - test-c
      - test-swift
      - test-kotlin
      - test-php
      - test-ruby
      - test-elixir
      - test-dart
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        pattern: test-results-*
        path: all-test-results
        merge-multiple: false

    - name: Upload merged test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: all-test-results/
        retention-days: 30
