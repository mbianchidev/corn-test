name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6,12 * * *"

jobs:
  test-java:
    name: Java (JUnit 5)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: java
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        cache-dependency-path: java/pom.xml

    - name: Build with Maven
      run: mvn clean compile

    - name: Run tests
      id: run_tests
      run: mvn test
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-java
        path: |
          java/target/surefire-reports/**/*
          java/target/*.log
        retention-days: 30

  test-python:
    name: Python (pytest + unittest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: python/requirements.txt

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run pytest
      run: python -m pytest --junitxml=reports/pytest-results.xml -v
      continue-on-error: true

    - name: Run unittest
      run: python -m pytest tests/test_*_pyunit.py --junitxml=reports/pyunit-results.xml -v
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-python
        path: python/reports/*.xml
        retention-days: 30

  test-typescript:
    name: TypeScript (Jest + Playwright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: typescript
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: typescript/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run Jest tests
      run: npx jest --ci --reporters=default --reporters=jest-junit
      continue-on-error: true
      env:
        JEST_JUNIT_OUTPUT_DIR: reports

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npx playwright test --reporter=junit
      continue-on-error: true
      env:
        PLAYWRIGHT_JUNIT_OUTPUT_NAME: reports/playwright-results.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-typescript
        path: typescript/reports/*.xml
        retention-days: 30

  test-golang:
    name: Go (testing)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: golang
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.24'
        cache-dependency-path: golang/go.sum

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Run tests
      run: gotestsum --junitfile reports/go-test-results.xml -- -v ./...
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-golang
        path: golang/reports/*.xml
        retention-days: 30

  test-csharp:
    name: C# (xUnit.net)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: csharp
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: '8.0'

    - name: Cache NuGet packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('csharp/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Run tests
      run: dotnet test --logger "junit;LogFilePath=reports/xunit-results.xml" --no-restore
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-csharp
        path: csharp/**/reports/*.xml
        retention-days: 30

  test-rust:
    name: Rust (cargo test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: rust
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
      with:
        toolchain: nightly

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: rust -> target

    - name: Install cargo2junit
      run: cargo install cargo2junit

    - name: Run tests
      run: cargo test -- -Z unstable-options --format json 2>/dev/null | cargo2junit > reports/rust-test-results.xml
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-rust
        path: rust/reports/*.xml
        retention-days: 30

  test-cpp:
    name: C++ (Google Test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cpp
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libgtest-dev ccache

    - name: Cache ccache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ccache
        key: ${{ runner.os }}-ccache-cpp-${{ hashFiles('cpp/src/**', 'cpp/tests/**', 'cpp/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ccache-cpp-

    - name: Build
      run: |
        cmake -B build -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache
        cmake --build build

    - name: Run tests
      run: |
        mkdir -p reports
        cd build && ctest --output-junit ../reports/gtest-results.xml --output-on-failure
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-cpp
        path: cpp/reports/*.xml
        retention-days: 30

  test-c:
    name: C (Unity)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: c
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake ruby ccache

    - name: Cache ccache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ccache
        key: ${{ runner.os }}-ccache-c-${{ hashFiles('c/src/**', 'c/tests/**', 'c/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ccache-c-

    - name: Build
      run: |
        cmake -B build -DCMAKE_C_COMPILER_LAUNCHER=ccache
        cmake --build build

    - name: Run tests
      run: |
        mkdir -p reports
        cd build && ctest --output-junit ../reports/unity-results.xml --output-on-failure
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-c
        path: c/reports/*.xml
        retention-days: 30

  test-swift:
    name: Swift (Swift Testing)
    runs-on: macos-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: swift
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Cache Swift packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: swift/.build
        key: ${{ runner.os }}-swift-${{ hashFiles('swift/Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-swift-

    - name: Build
      run: swift build

    - name: Run tests
      run: swift test 2>&1 | tee reports/swift-test-output.txt
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-swift
        path: swift/reports/*
        retention-days: 30

  test-kotlin:
    name: Kotlin (kotlin.test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: kotlin
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

    - name: Run tests
      run: ./gradlew test
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-kotlin
        path: kotlin/build/test-results/**/*.xml
        retention-days: 30

  test-php:
    name: PHP (PHPUnit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: php
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up PHP
      uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
      with:
        php-version: '8.4'
        tools: composer

    - name: Cache Composer dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/composer
        key: ${{ runner.os }}-composer-${{ hashFiles('php/composer.json') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install dependencies
      run: composer install --no-interaction

    - name: Run tests
      run: vendor/bin/phpunit --log-junit reports/phpunit-results.xml
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-php
        path: php/reports/*.xml
        retention-days: 30

  test-ruby:
    name: Ruby (RSpec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ruby
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Ruby
      uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
      with:
        ruby-version: '3.3'
        bundler-cache: true
        working-directory: ruby

    - name: Run tests
      run: bundle exec rspec --format RspecJunitFormatter --out reports/rspec-results.xml --format documentation
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-ruby
        path: ruby/reports/*.xml
        retention-days: 30

  test-elixir:
    name: Elixir (ExUnit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: elixir
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Elixir
      uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
      with:
        elixir-version: '1.16'
        otp-version: '26'

    - name: Cache Elixir dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          elixir/deps
          elixir/_build
        key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mix.exs') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install dependencies
      run: mix deps.get

    - name: Run tests
      run: mix test --formatter JUnitFormatter
      continue-on-error: true
      env:
        JUNIT_OUTPUT_DIR: reports

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-elixir
        path: elixir/reports/*.xml
        retention-days: 30

  test-dart:
    name: Dart (dart test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dart
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Dart
      uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
      with:
        sdk: '3.3.0'

    - name: Cache Dart dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-dart-${{ hashFiles('dart/pubspec.yaml') }}
        restore-keys: |
          ${{ runner.os }}-dart-

    - name: Install dependencies
      run: dart pub get

    - name: Run tests
      run: |
        mkdir -p reports
        dart test --reporter json | dart run junitreport:tojunit > reports/dart-test-results.xml
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-dart
        path: dart/reports/*.xml
        retention-days: 30

  collect-results:
    name: Collect All Test Results
    needs:
      - test-java
      - test-python
      - test-typescript
      - test-golang
      - test-csharp
      - test-rust
      - test-cpp
      - test-c
      - test-swift
      - test-kotlin
      - test-php
      - test-ruby
      - test-elixir
      - test-dart
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Download all test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: test-results-*
        path: all-test-results
        merge-multiple: false

    - name: Upload merged test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results
        path: all-test-results/
        retention-days: 30
