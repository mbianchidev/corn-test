name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6,12 * * *"  

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build with Maven
      run: mvn clean compile
      
    - name: Run tests
      id: run_tests
      run: mvn test
      continue-on-error: true
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          target/surefire-reports/**/*
          target/*.log
        retention-days: 30
        
    - name: Upload test report summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-summary
        path: |
          target/surefire-reports/*.txt
          target/surefire-reports/*.xml
        retention-days: 30
